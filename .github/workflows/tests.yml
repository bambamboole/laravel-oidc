name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [server, client, ui]
    name: Lint & static analysis (${{ matrix.package }})
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gmp, bcmath, openssl, mbstring, dom, curl, json
          coverage: none

      - name: Use the monorepo server package (ui only)
        if: matrix.package == 'ui'
        run: composer config repositories.server '{"type":"path","url":"../server","options":{"symlink":true,"versions":{"bambamboole/laravel-oidc-server":"0.7.0"}}}'

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [server, client, ui]
        php: ['8.4']
        testbench: ['10.*', '11.*']
        stability: [prefer-stable]
        include:
          - package: server
            php: '8.4'
            testbench: '11.*'
            stability: prefer-lowest
          - package: client
            php: '8.4'
            testbench: '11.*'
            stability: prefer-lowest
          - package: ui
            php: '8.4'
            testbench: '11.*'
            stability: prefer-lowest

    name: ${{ matrix.package }} - PHP ${{ matrix.php }} - Testbench ${{ matrix.testbench }} - ${{ matrix.stability }}
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gmp, bcmath, openssl, mbstring, dom, curl, json
          coverage: none

      # Compat matrix: don't block dependency resolution on framework security
      # advisories — we are testing version compatibility, not shipping the app.
      - name: Allow advisory-affected framework versions
        run: composer config policy.advisories.block false

      - name: Use the monorepo server package (ui only)
        if: matrix.package == 'ui'
        run: composer config repositories.server '{"type":"path","url":"../server","options":{"symlink":true,"versions":{"bambamboole/laravel-oidc-server":"0.7.0"}}}'

      - name: Constrain testbench
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Tests (Pest)
        run: vendor/bin/pest

  keyless-boot:
    runs-on: ubuntu-latest
    name: Keyless boot (no APP_KEY)
    defaults:
      run:
        working-directory: packages/server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gmp, bcmath, openssl, mbstring, dom, curl, json
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Discover packages without an app key
        run: APP_KEY= vendor/bin/testbench package:discover --ansi

  master:
    runs-on: ubuntu-latest
    name: Master package integrity
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gmp, bcmath, openssl, mbstring, dom, curl, json
          coverage: none

      - name: Validate root composer.json
        run: composer validate --strict

      - name: Smoke-install the master as a consumer
        run: |
          mkdir -p /tmp/master-smoke && cd /tmp/master-smoke
          cat > composer.json <<JSON
          {
              "repositories": [
                  {"type": "path", "url": "${GITHUB_WORKSPACE}", "options": {"symlink": false}}
              ],
              "require": {"bambamboole/laravel-oidc": "*"},
              "minimum-stability": "dev",
              "prefer-stable": true
          }
          JSON
          composer install --no-interaction
          php -r "require 'vendor/autoload.php'; exit(class_exists('Bambamboole\\LaravelOidc\\OidcServiceProvider') && class_exists('Bambamboole\\LaravelOidcClient\\OidcClientServiceProvider') && class_exists('Bambamboole\\LaravelOidc\\Ui\\UiServiceProvider') ? 0 : 1);"

      # Guards the master package's ONLY path to Lattice discovery: the ui package is
      # replace()d, so packages/ui/composer.json is never read from a master install —
      # only this root composer.json's lattice-php/lattice constraint and extra.lattice
      # govern it. Fails loudly if either regresses.
      - name: Assert lattice discovery for master installs
        working-directory: /tmp/master-smoke
        run: |
          php -r '
          require "vendor/autoload.php";
          $version = Composer\InstalledVersions::getVersion("lattice-php/lattice");
          if ($version === null || version_compare($version, "0.25.0", "<")) {
              fwrite(STDERR, "lattice-php/lattice version too low: ".var_export($version, true)."\n");
              exit(1);
          }
          $roots = Lattice\Lattice\Core\Discovery\ComponentPackages::discoverRoots();
          foreach ($roots as $root) {
              if (str_ends_with($root, "packages/ui/src")) {
                  exit(0);
              }
          }
          fwrite(STDERR, "packages/ui/src missing from discovery roots: ".implode(", ", $roots)."\n");
          exit(1);
          '
